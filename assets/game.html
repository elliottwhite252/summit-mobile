<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:absolute;top:0;left:0}
.ctrl{position:fixed;bottom:10px;display:flex;align-items:center;gap:8px;z-index:10}
.ctrl-l{left:10px}
.ctrl-r{right:10px}
.ctrl-c{left:50%;transform:translateX(-50%)}
.btn{width:56px;height:56px;border-radius:28px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font:bold 11px monospace}
.btn-jump{border-color:rgba(180,160,255,0.4);background:rgba(180,160,255,0.08)}
.btn-dash{border-color:rgba(255,180,200,0.4);background:rgba(255,180,200,0.08)}
.btn-sq{border-radius:12px;width:52px;height:52px}
.shop-btn{padding:4px 10px;border-radius:4px;background:rgba(241,196,15,0.1);border:1px solid rgba(241,196,15,0.2);color:#f1c40f;font:bold 10px monospace}
.mute-btn{font-size:16px;padding:4px;background:none;border:none}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(10,10,18,0.92);font-family:monospace;color:#fff}
#overlay.hidden{display:none}
#overlay h1{font-size:36px;color:#c4b5fd;letter-spacing:8px;text-shadow:0 0 30px rgba(180,160,255,0.5)}
#overlay .sub{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin:8px 0 24px;font-style:italic}
#overlay .start-btn{background:rgba(180,160,255,0.15);border:1px solid rgba(180,160,255,0.3);padding:12px 28px;border-radius:20px;color:#c4b5fd;font:bold 14px monospace;cursor:pointer}
#overlay .start-btn:active{background:rgba(180,160,255,0.3)}
.shop-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:25;background:rgba(10,10,18,0.95);font-family:monospace;color:#fff;overflow-y:auto;padding:16px;display:none}
.shop-overlay.visible{display:block}
.offer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:22;background:rgba(10,10,18,0.8);display:none;align-items:center;justify-content:center;font-family:monospace}
.offer-overlay.visible{display:flex}
</style>
</head><body>
<canvas id="c"></canvas>

<div id="overlay">
<div style="text-align:center">
<div style="font-size:40px;margin-bottom:12px;opacity:0.6">💭</div>
<h1>DRIFT</h1>
<div class="sub">some dreams you have to fall through to wake up</div>
<button class="start-btn" ontouchstart="startGame()" onclick="startGame()">enter the dream</button>
</div>
</div>

<div id="controls" style="display:none">
<div class="ctrl ctrl-l">
<div class="btn btn-sq" ontouchstart="inp.left=true" ontouchend="inp.left=false">◀</div>
<div class="btn btn-sq" ontouchstart="inp.right=true" ontouchend="inp.right=false">▶</div>
</div>
<div class="ctrl ctrl-c">
<div id="boosterBtn" style="display:none"><div class="btn" style="width:44px;height:44px;border-radius:22px;border-color:rgba(241,196,15,0.4);background:rgba(241,196,15,0.08);font-size:18px" ontouchstart="activateBooster()">⚡</div></div>
<button class="mute-btn" id="sfxBtn" ontouchstart="toggleSfx()">🔊</button>
<button class="mute-btn" id="musBtn" ontouchstart="toggleMus()">🎵</button>
<button class="shop-btn" ontouchstart="openShop()">🪙 SHOP</button>
<button class="shop-btn" ontouchstart="backToMenu()" style="background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.08);color:#666">☰</button>
</div>
<div class="ctrl ctrl-r">
<div class="btn btn-dash" ontouchstart="inp.dash=true" ontouchend="inp.dash=false">DASH</div>
<div class="btn btn-jump" ontouchstart="inp.jump=true;inp.jjp=true" ontouchend="inp.jump=false">JUMP</div>
</div>
</div>

<div class="shop-overlay" id="shop"></div>
<div class="offer-overlay" id="offer"></div>
<div id="winOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(10,10,18,0.92);font-family:monospace;color:#fff"></div>
<div id="roomTitle" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;display:none;align-items:center;justify-content:center;pointer-events:none;font-family:monospace"></div>

<script>
// ─── Constants ───
const W=800,H=500,TILE=20,GRAVITY=0.55,MAX_FALL=8,PLAYER_SPEED=3.2,JUMP_FORCE=-9.5,JUMP_CUT=-3,WALL_SLIDE_SPEED=1.2,WALL_JUMP_H=5,WALL_JUMP_V=-9,DASH_SPEED=10,DASH_DURATION=8,DASH_COOLDOWN=4,COYOTE_FRAMES=6,JUMP_BUFFER_FRAMES=6,CRUMBLE_DELAY=18,CRUMBLE_RESPAWN=180,SPRING_FORCE=-13,PW=12,PH=16,HAIR_COUNT=5,HALF_GRAV_THRESHOLD=-2,CORNER_CORRECTION=4,WALL_JUMP_FORGIVENESS=4,DEFAULT_HAIR="#c4b5fd";

// ─── Room Themes ───
const ROOM_THEMES=[
  {name:"Innocence",bg1:"#1a0f1e",bg2:"#2d1f3a",accent:"#f0c6d4",particle:"#f8b4c8",platColor:"rgba(240,198,212,0.2)",platEdge:"rgba(240,198,212,0.4)",spikeColor:"#8b3a5a",playerTint:"#f0c6d4"},
  {name:"Wonder",bg1:"#1a1508",bg2:"#2d2510",accent:"#f0c040",particle:"#ffd700",platColor:"rgba(240,192,64,0.2)",platEdge:"rgba(240,192,64,0.4)",spikeColor:"#8b6914",playerTint:"#f0c040"},
  {name:"Unease",bg1:"#1e1408",bg2:"#3a2510",accent:"#e0883a",particle:"#d4762a",platColor:"rgba(224,136,58,0.2)",platEdge:"rgba(224,136,58,0.4)",spikeColor:"#8b4513",playerTint:"#e0883a"},
  {name:"Betrayal",bg1:"#1a0808",bg2:"#350a0a",accent:"#c03030",particle:"#ff4040",platColor:"rgba(192,48,48,0.15)",platEdge:"rgba(192,48,48,0.35)",spikeColor:"#8b0000",playerTint:"#c03030"},
  {name:"Solitude",bg1:"#0c0e14",bg2:"#181c28",accent:"#7088a0",particle:"#5a7090",platColor:"rgba(112,136,160,0.2)",platEdge:"rgba(112,136,160,0.35)",spikeColor:"#3a4a5a",playerTint:"#7088a0"},
  {name:"Resilience",bg1:"#081a10",bg2:"#0f2a18",accent:"#40b870",particle:"#30d060",platColor:"rgba(64,184,112,0.2)",platEdge:"rgba(64,184,112,0.4)",spikeColor:"#1a5c30",playerTint:"#40b870"},
  {name:"Love",bg1:"#1a0820",bg2:"#2a1038",accent:"#c060d0",particle:"#e080f0",platColor:"rgba(192,96,208,0.2)",platEdge:"rgba(192,96,208,0.4)",spikeColor:"#6a2080",playerTint:"#c060d0"},
  {name:"Confession",bg1:"#121218",bg2:"#1a1a28",accent:"#8080a0",particle:"#a0a0c0",platColor:"rgba(128,128,160,0.2)",platEdge:"rgba(128,128,160,0.35)",spikeColor:"#404060",playerTint:"#8080a0"},
  {name:"Despair",bg1:"#050508",bg2:"#0a0a10",accent:"#3040608",particle:"#202838",platColor:"rgba(48,64,96,0.15)",platEdge:"rgba(48,64,96,0.3)",spikeColor:"#1a2030",playerTint:"#304060"},
  {name:"Defiance",bg1:"#200808",bg2:"#380808",accent:"#e04040",particle:"#ff6030",platColor:"rgba(224,64,64,0.2)",platEdge:"rgba(224,64,64,0.4)",spikeColor:"#a02020",playerTint:"#e04040"},
  {name:"Release",bg1:"#141828",bg2:"#202840",accent:"#a0c0e0",particle:"#c0d8f0",platColor:"rgba(160,192,224,0.2)",platEdge:"rgba(160,192,224,0.4)",spikeColor:"#506080",playerTint:"#a0c0e0"},
  {name:"Awakening",bg1:"#1a1a1a",bg2:"#2a2a2a",accent:"#e0e0e0",particle:"#ffffff",platColor:"rgba(224,224,224,0.2)",platEdge:"rgba(224,224,224,0.5)",spikeColor:"#808080",playerTint:"#e0e0e0"}
];

const BOOSTERS=[{id:"checkpoint",name:"Checkpoint",cost:5,desc:"Place a mid-room respawn",icon:"🚩"},{id:"slowmo",name:"Slow-Mo",cost:3,desc:"50% speed for 5 sec",icon:"🕐"},{id:"shield",name:"Air Shield",cost:8,desc:"Survive one spike hit",icon:"🛡️"},{id:"doubleDash",name:"Double Dash",cost:10,desc:"Two air dashes",icon:"💨"},{id:"springBoost",name:"Spring+",cost:3,desc:"Springs launch higher",icon:"🚀"}];

const COSMETICS=[{id:"hair_blue",type:"hair",name:"Ocean Light",cost:10,color:"#3498db"},{id:"hair_purple",type:"hair",name:"Twilight",cost:10,color:"#9b59b6"},{id:"hair_gold",type:"hair",name:"Sunbeam",cost:10,color:"#f1c40f"},{id:"hair_green",type:"hair",name:"Verdant",cost:10,color:"#2ecc71"},{id:"hair_white",type:"hair",name:"Moonlight",cost:10,color:"#ecf0f1"},{id:"trail_fire",type:"trail",name:"Ember Trail",cost:20,color:"#e67e22"},{id:"trail_ice",type:"trail",name:"Frost Trail",cost:20,color:"#74b9ff"},{id:"trail_rainbow",type:"trail",name:"Prism Trail",cost:20,color:"#fd79a8"},{id:"trail_stars",type:"trail",name:"Starlight Trail",cost:20,color:"#ffeaa7"},{id:"death_explode",type:"deathEffect",name:"Shatter",cost:15,color:"#e74c3c"},{id:"death_dissolve",type:"deathEffect",name:"Dissolve",cost:15,color:"#a29bfe"},{id:"death_shatter",type:"deathEffect",name:"Scatter",cost:15,color:"#00cec9"},{id:"hair_aurora",type:"hair",name:"Aurora ⭐",cost:999,color:"#ff6b9d"},{id:"trail_aurora",type:"trail",name:"Aurora Trail ⭐",cost:999,color:"#c44dff"}];

// ─── Canvas ───
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
let cw=window.innerWidth,ch=window.innerHeight;canvas.width=cw;canvas.height=ch;
let scale=Math.min(cw/W,(ch-70)/H),ox=(cw-W*scale)/2,oy=((ch-70)-H*scale)/2;
window.addEventListener('resize',()=>{cw=window.innerWidth;ch=window.innerHeight;canvas.width=cw;canvas.height=ch;scale=Math.min(cw/W,(ch-70)/H);ox=(cw-W*scale)/2;oy=((ch-70)-H*scale)/2});

// ─── Input ───
let inp={left:false,right:false,jump:false,jjp:false,dash:false,up:false,down:false};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')inp.left=true;if(e.key==='ArrowRight'||e.key==='d')inp.right=true;if(e.key===' '||e.key==='c'||e.key==='ArrowUp'||e.key==='w'){inp.jump=true;inp.jjp=true}if(e.key==='Shift'||e.key==='x'||e.key==='z')inp.dash=true;if(e.key==='ArrowUp'||e.key==='w')inp.up=true;if(e.key==='ArrowDown'||e.key==='s')inp.down=true;if(e.key==='Tab'){e.preventDefault();openShop()}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')inp.left=false;if(e.key==='ArrowRight'||e.key==='d')inp.right=false;if(e.key===' '||e.key==='c'||e.key==='ArrowUp'||e.key==='w')inp.jump=false;if(e.key==='ArrowUp'||e.key==='w')inp.up=false;if(e.key==='ArrowDown'||e.key==='s')inp.down=false});

// ─── Persistence ───
function loadSave(){try{const r=localStorage.getItem("drift_save");if(r){const d=JSON.parse(r);return{...d,starterPack:d.starterPack||false}}}catch{}return{coins:0,owned:[],eqHair:"",eqTrail:"",eqDeath:"",starterPack:false}}
function writeSave(){try{localStorage.setItem("drift_save",JSON.stringify({coins:gs.coins,owned:[...gs.ownedCosmetics],eqHair:gs.equippedHair,eqTrail:gs.equippedTrail,eqDeath:gs.equippedDeathEffect,starterPack:gs.starterPackBought}))}catch{}}
let sfxMuted=localStorage.getItem("drift_sfx_muted")==="true";
let musicMuted=localStorage.getItem("drift_music_muted")==="true";
function toggleSfx(){sfxMuted=!sfxMuted;localStorage.setItem("drift_sfx_muted",String(sfxMuted));document.getElementById('sfxBtn').textContent=sfxMuted?'🔇':'🔊'}
function toggleMus(){musicMuted=!musicMuted;localStorage.setItem("drift_music_muted",String(musicMuted));if(musicMuted)stopBGM();else if(gs&&gs.status==='playing')startBGM();document.getElementById('musBtn').textContent=musicMuted?'🔇':'🎵'}

// ─── Helpers ───
function ro(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function spikeHB(s){const z=8;switch(s.dir){case"up":return{x:s.x+4,y:s.y-z,w:12,h:z};case"down":return{x:s.x+4,y:s.y,w:12,h:z};case"left":return{x:s.x-z,y:s.y+4,w:z,h:12};case"right":return{x:s.x+TILE,y:s.y+4,w:z,h:12}}}
function getHC(){if(gs.equippedHair){const c=COSMETICS.find(c=>c.id===gs.equippedHair);if(c)return c.color}return DEFAULT_HAIR}
function getTC(){if(gs.equippedTrail){const c=COSMETICS.find(c=>c.id===gs.equippedTrail);if(c)return c.color}return"#e0c0ff"}
function getDC(){if(gs.equippedDeathEffect){const c=COSMETICS.find(c=>c.id===gs.equippedDeathEffect);if(c)return[c.color,"#fff"]}return[DEFAULT_HAIR,"#fff"]}
function mkPlayer(sp,hc){const hair=[];for(let i=0;i<HAIR_COUNT;i++)hair.push({x:sp.x+PW/2,y:sp.y});return{x:sp.x,y:sp.y,vx:0,vy:0,grounded:false,wallDir:0,facing:1,canDash:true,dashing:0,dashDir:{x:0,y:0},dashCooldown:0,coyoteTimer:0,jumpBuffer:0,jumpHeld:false,dead:false,deadTimer:0,hair,hairColor:hc||DEFAULT_HAIR,dashCount:0}}
function mkParticles(ri){const f=[];const count=25;for(let i=0;i<count;i++){const t=ROOM_THEMES[ri]||ROOM_THEMES[0];f.push({x:Math.random()*W,y:Math.random()*H,speed:0.2+Math.random()*0.6,drift:Math.random()*0.4-0.2,size:1+Math.random()*3,type:ri})}return f}

case"strawberry":{const d=.35,s=new Float32Array(sr*d|0);const n=[523,659,784,1047];for(let i=0;i<s.length;i++){const t=i/sr;s[i]=sn(t,n[Math.min(t/d*n.length|0,n.length-1)])*(1-t/d)*.25}return s}
case"spring":{const d=.18,s=new Float32Array(sr*d|0);for(let i=0;i<s.length;i++){const t=i/sr,p=t/d;s[i]=sn(t,p<.6?lr(200,800,p/.6):lr(800,400,(p-.6)/.4))*(1-p)*.3}return s}
case"coin":{const d=.08,s=new Float32Array(sr*d|0);for(let i=0;i<s.length;i++){const t=i/sr;s[i]=sn(t,t<d/2?800:1200)*(1-t/d)*.2}return s}

function initSfx(){try{const c=getAC();["jump","walljump","dash","death","strawberry","spring","coin","buy"].forEach(t=>{const s=genSfx(t,c.sampleRate);const b=c.createBuffer(1,s.length,c.sampleRate);b.getChannelData(0).set(s);sfxBufs[t]=b})}catch{}}

  if(gs.transitionTimer>0){gs.transitionTimer--;if(gs.transitionTimer===10&&gs.transitionDir===1){if(gs.currentRoom<gs.rooms.length-1)enterRoom(gs.currentRoom+1);gs.transitionDir=-1}return}
  if(p.x>=room.exitX&&p.grounded){gs.coins+=1;sfx("coin");
    if(gs.currentRoom<gs.rooms.length-1){gs.transitionTimer=20;gs.transitionDir=1;sfx("buy");
      if((gs.currentRoom+1)%3===0)try{window.ReactNativeWebView?.postMessage(JSON.stringify({type:'showInterstitial'}))}catch{}}
    else{gs.coins+=5;gs.status="win";stopBGM();showWin();writeSave();return}writeSave();return}
  const hx=p.x+PW/2,hy=p.y-1;for(let i=0;i<p.hair.length;i++){const tgt=i===0?{x:hx,y:hy}:p.hair[i-1];p.hair[i].x+=(tgt.x-p.hair[i].x)*.4;p.hair[i].y+=(tgt.y-p.hair[i].y)*.4;p.hair[i].x-=p.facing*(i*1.2);p.hair[i].y+=i*.5}
  gs.particles=gs.particles.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.08;pt.life-=.03;return pt.life>0});
}
// ─── Render (dream-themed) ───
function render(){
  if(!gs)return;const room=gs.rooms[gs.currentRoom];const t=ROOM_THEMES[gs.currentRoom]||ROOM_THEMES[0];
  ctx.fillStyle="#0a0a12";ctx.fillRect(0,0,cw,ch);
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  if(gs.screenShake>0)ctx.translate((Math.random()-.5)*gs.screenShake,(Math.random()-.5)*gs.screenShake);
  // BG gradient
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,t.bg1);grad.addColorStop(1,t.bg2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Floating shapes (abstract background)
  ctx.globalAlpha=.06;ctx.fillStyle=t.accent;
  for(let i=0;i<5;i++){const bx=((i*173+gs.time*.2)%W);const by=100+Math.sin(gs.time*.005+i*2)*120;
    ctx.beginPath();ctx.arc(bx,by,40+i*15,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  // Vignette for dark rooms
  if(gs.currentRoom===3||gs.currentRoom===8||gs.currentRoom===9){
    const vg=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,400);vg.addColorStop(0,"transparent");vg.addColorStop(1,"rgba(0,0,0,0.4)");ctx.fillStyle=vg;ctx.fillRect(0,0,W,H)}
  // Ambient particles
  for(const s of gs.ambientParticles){ctx.globalAlpha=.4+Math.sin(gs.time*.03+s.x)*.2;ctx.fillStyle=t.particle;
    if(gs.currentRoom===4){ctx.fillRect(s.x,s.y,1,4)} // rain streaks
    else if(gs.currentRoom===5){ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill()} // bubbles
    else{ctx.fillRect(s.x,s.y,s.size,s.size)}}
  ctx.globalAlpha=1;
  // Platforms (glass-like)
  for(const pl of room.platforms){
    ctx.fillStyle=t.platColor;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle=t.platEdge;ctx.fillRect(pl.x,pl.y,pl.w,1);ctx.fillRect(pl.x,pl.y+pl.h-1,pl.w,1);
    ctx.fillRect(pl.x,pl.y,1,pl.h);ctx.fillRect(pl.x+pl.w-1,pl.y,1,pl.h)}
  // Crumbles (fading memories)
  for(const c of room.crumbles){if(!c.visible)continue;const shk=c.timer>0?Math.sin(gs.time*.8)*2:0;
    ctx.globalAlpha=c.timer>0?.5+Math.sin(gs.time*.5)*.2:.7;ctx.fillStyle=t.accent;ctx.fillRect(c.x+shk,c.y,c.w,TILE);ctx.globalAlpha=1}
  // Spikes (thorns — organic triangles)
  for(const s of room.spikes){ctx.fillStyle=t.spikeColor;ctx.beginPath();
    switch(s.dir){case"up":ctx.moveTo(s.x+2,s.y);ctx.quadraticCurveTo(s.x+10,s.y-14,s.x+18,s.y);break;
    case"down":ctx.moveTo(s.x+2,s.y+TILE);ctx.quadraticCurveTo(s.x+10,s.y+TILE+14,s.x+18,s.y+TILE);break;
    case"left":ctx.moveTo(s.x,s.y+2);ctx.quadraticCurveTo(s.x-14,s.y+10,s.x,s.y+18);break;
    case"right":ctx.moveTo(s.x+TILE,s.y+2);ctx.quadraticCurveTo(s.x+TILE+14,s.y+10,s.x+TILE,s.y+18);break}
    ctx.fill();ctx.fillStyle=t.spikeColor+'40';ctx.fill()}
  // Memory fragments (collectibles)
  for(const s of room.strawberries){if(s.collected)continue;const bob=Math.sin(gs.time*.06)*3;
    // Outer glow
    ctx.fillStyle="rgba(255,255,255,0.08)";ctx.beginPath();ctx.arc(s.x,s.y+bob,14,0,Math.PI*2);ctx.fill();
    // Inner glow
    const fg=ctx.createRadialGradient(s.x,s.y+bob,0,s.x,s.y+bob,8);fg.addColorStop(0,"rgba(255,255,255,0.9)");fg.addColorStop(.5,t.accent+"90");fg.addColorStop(1,"transparent");
    ctx.fillStyle=fg;ctx.beginPath();ctx.arc(s.x,s.y+bob,8,0,Math.PI*2);ctx.fill();
    // Spiral
    ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=1;ctx.beginPath();
    for(let a=0;a<Math.PI*3;a+=.3){const r=a*1.2;ctx.lineTo(s.x+Math.cos(a+gs.time*.03)*r,s.y+bob+Math.sin(a+gs.time*.03)*r)}ctx.stroke()}
  // Springs (thought bubbles)
  for(const s of room.springs){const comp=s.activated>0;const by=comp?s.y+4:s.y;
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.beginPath();ctx.arc(s.x+10,by,comp?8:12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=t.accent;ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x+10,by,comp?8:12,0,Math.PI*2);ctx.stroke();
    // Small bubbles below
    ctx.fillStyle="rgba(255,255,255,0.1)";ctx.beginPath();ctx.arc(s.x+10,by+16,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s.x+10,by+22,2,0,Math.PI*2);ctx.fill()}
  // Checkpoint
  if(gs.checkpoint){const cp=gs.checkpoint;ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(gs.time*.08)*.2})`;ctx.beginPath();ctx.arc(cp.x+PW/2,cp.y+PH/2,10,0,Math.PI*2);ctx.fill();ctx.strokeStyle="rgba(255,255,255,0.5)";ctx.lineWidth=1;ctx.beginPath();ctx.arc(cp.x+PW/2,cp.y+PH/2,12+Math.sin(gs.time*.1)*2,0,Math.PI*2);ctx.stroke()}
  // Particles
  for(const pt of gs.particles){ctx.globalAlpha=Math.max(0,pt.life);ctx.fillStyle=pt.color;ctx.fillRect(pt.x,pt.y,pt.size,pt.size)}ctx.globalAlpha=1;
  // Player (glowing silhouette)
  const pl2=gs.player;if(!pl2.dead){
    // Light trail
    for(let i=pl2.hair.length-1;i>=0;i--){const h=pl2.hair[i];const sz=5-i*.8;ctx.globalAlpha=(.8-i*.15)*(.5+Math.sin(gs.time*.05)*.2);
      ctx.fillStyle=pl2.hairColor;ctx.beginPath();ctx.arc(h.x,h.y,sz,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
    // Body glow
    const pglow=ctx.createRadialGradient(pl2.x+PW/2,pl2.y+PH/2,0,pl2.x+PW/2,pl2.y+PH/2,16);
    pglow.addColorStop(0,pl2.hairColor+"60");pglow.addColorStop(1,"transparent");
    ctx.fillStyle=pglow;ctx.fillRect(pl2.x-10,pl2.y-10,PW+20,PH+20);
    // Body silhouette
    ctx.save();ctx.translate(pl2.x+PW/2,pl2.y+PH/2);
    let sx2=1,sy2=1;if(pl2.dashing>0){sx2=1.3;sy2=.7}else if(!pl2.grounded&&pl2.vy<-2){sx2=.85;sy2=1.15}else if(!pl2.grounded&&pl2.vy>2){sx2=1.1;sy2=.9}
    ctx.scale(sx2,sy2);
    // Oval body
    ctx.fillStyle=pl2.hairColor;ctx.beginPath();ctx.ellipse(0,0,PW/2+1,PH/2+1,0,0,Math.PI*2);ctx.fill();
    // Inner bright core
    ctx.fillStyle="rgba(255,255,255,0.4)";ctx.beginPath();ctx.ellipse(0,-2,PW/3,PH/3,0,0,Math.PI*2);ctx.fill();
    // Eye
    ctx.fillStyle="rgba(255,255,255,0.8)";ctx.beginPath();ctx.arc(pl2.facing*3,-3,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
    if(gs.shieldActive){ctx.strokeStyle="rgba(255,255,255,0.3)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(pl2.x+PW/2,pl2.y+PH/2,16+Math.sin(gs.time*.1)*2,0,Math.PI*2);ctx.stroke()}}
  // HUD
  ctx.font="bold 13px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(8,8,90,22);ctx.fillRect(8,34,90,22);ctx.fillRect(W/2-45,8,90,22);ctx.fillRect(W-88,8,80,22);
  ctx.fillStyle="rgba(255,100,100,0.7)";ctx.fillText("✕ "+gs.deaths,14,24);
  ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillText("◈ "+gs.strawberriesCollected+"/"+gs.totalStrawberries,14,50);
  ctx.fillStyle="rgba(241,196,15,0.7)";ctx.fillText(gs.coins+"c",W/2-25,24);
  ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillText((gs.currentRoom+1)+"/"+gs.rooms.length,W-78,24);
  if(gs.activeBooster){const b=BOOSTERS.find(b=>b.id===gs.activeBooster);if(b){ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(W/2-45,34,90,18);ctx.fillStyle="rgba(255,200,100,0.6)";ctx.font="bold 10px monospace";ctx.fillText(b.name,W/2-35,48)}}
  if(gs.slowMoFrames>0){ctx.fillStyle=t.accent+"40";ctx.fillRect(0,0,W*(gs.slowMoFrames/300),2)}
  // Transition fade
  if(gs.transitionTimer>0){const prog=gs.transitionDir===1?(20-gs.transitionTimer)/10:gs.transitionTimer/10;ctx.fillStyle=`rgba(10,10,18,${Math.min(1,Math.max(0,prog))})`;ctx.fillRect(-10,-10,W+20,H+20)}
  ctx.restore();
}
